name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        working-directory: crates/astro-post-audit
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: crates/astro-post-audit
        run: cargo clippy -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: crates/astro-post-audit
        run: cargo test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        working-directory: crates/astro-post-audit
        run: cargo build --release

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: packages/astro-post-audit
        run: npm ci

      - name: Verify binary compatibility
        working-directory: packages/astro-post-audit
        run: npm run verify:binary

      - name: Type check
        working-directory: packages/astro-post-audit
        run: npx tsc --noEmit

      - name: Package smoke test
        working-directory: packages/astro-post-audit
        run: |
          TARBALL="$(npm pack | tail -n 1)"
          mkdir -p .tmp-smoke
          cd .tmp-smoke
          npm init -y >/dev/null 2>&1
          npm i "../$TARBALL" astro --ignore-scripts
          node -e "import('@casoon/astro-post-audit').then(() => process.exit(0)).catch((e) => { console.error(e); process.exit(1); })"
